name: tests

# Suite pytest (helpers config / container / cli — pas de démon Docker requis).
# Découplée du build d'images : tourne dès que le code ou les tests changent.

on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - .github/workflows/test.yml
  pull_request: {}
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9/3.10 exercent le repli tomli ; 3.11+ le tomllib natif.
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (package + dev deps)
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: pytest
