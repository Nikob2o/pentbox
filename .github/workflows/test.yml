name: tests

# Suite pytest (helpers config / container / cli — pas de démon Docker requis).
# Découplée du build d'images : tourne dès que le code ou les tests changent.

on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - .github/workflows/test.yml
  pull_request: {}
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (package + dev deps)
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: pytest
