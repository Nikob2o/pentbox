name: build-and-push

# Build de l'image pentbox « kali » et push sur Docker Hub.
# Tourne sur les machines de GitHub (pas besoin que ton PC soit allumé).
#
# Prérequis (repo GitHub → Settings → Secrets → Actions) :
#   - secret DOCKERHUB_USERNAME : ton user Docker Hub
#   - secret DOCKERHUB_TOKEN    : un token d'accès Docker Hub (Read & Write)
# Côté client : renseigne [registry].namespace dans ~/.config/pentbox/config.toml.

on:
  push:
    branches: [main]
    paths:            # ne rebuild que si l'image/les assets changent
      - images/**
      - assets/**
      - .github/workflows/build.yml
  schedule:
    - cron: "0 4 * * 1"   # rebuild hebdo (lundi 04:00 UTC) pour la fraîcheur des outils
  workflow_dispatch: {}    # déclenchement manuel

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/kali.dockerfile
          push: true
          build-args: |
            HOST_UID=1000
            HOST_GID=1000
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pentbox-kali:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
